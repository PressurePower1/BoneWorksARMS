name: Build BoneworksArms Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Download MelonLoader
        continue-on-error: true
        run: |
          mkdir -p libs
          wget -q https://github.com/LavaGang/MelonLoader/releases/download/v0.6.6/MelonLoader.x64.zip -O ml.zip || echo "FAILED: MelonLoader download"
          unzip -o ml.zip -d ml_extracted/ || echo "FAILED: MelonLoader unzip"
          find ml_extracted/ -name "MelonLoader.dll" | head -1 | xargs -I{} cp {} libs/ || echo "FAILED: MelonLoader copy"
          echo "=== libs so far ===" && ls libs/

      - name: Download BoneLib from Thunderstore
        continue-on-error: true
        run: |
          wget -q "https://thunderstore.io/package/download/gnonme/BoneLib/3.3.0/" -O bonelib.zip || echo "FAILED: BoneLib download"
          unzip -o bonelib.zip -d bonelib_extracted/ || echo "FAILED: BoneLib unzip"
          find bonelib_extracted/ -name "*.dll" | xargs -I{} cp {} libs/ || echo "FAILED: BoneLib copy"
          echo "=== libs so far ===" && ls libs/

      - name: Build mod
        run: dotnet build BoneworksArms.csproj -c Release

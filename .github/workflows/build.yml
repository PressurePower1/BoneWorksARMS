name: Build BoneworksArms Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Download MelonLoader
        run: |
          mkdir -p libs
          wget -q https://github.com/LavaGang/MelonLoader/releases/download/v0.6.6/MelonLoader.x64.zip -O ml.zip
          unzip -o ml.zip -d ml_extracted/
          find ml_extracted/ -name "MelonLoader.dll" | head -1 | xargs -I{} cp {} libs/
          ls libs/

      - name: Download BoneLib source and game stubs
        run: |
          wget -q https://github.com/SLZ-Mods/BoneLib/archive/refs/heads/main.zip -O bonelib-src.zip
          unzip -o bonelib-src.zip -d bonelib-src/
          find bonelib-src/ -name "*.dll" | xargs -I{} cp {} libs/ 2>/dev/null || true
          echo "Libs found:"
          ls libs/

      - name: Build mod
        run: dotnet build BoneworksArms.csproj -c Release

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoneworksArms
          path: "bin/Release/net6.0/BoneworksArms.dll"
          if-no-files-found: error


name: Build BoneworksArms Mod

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Download MelonLoader
        run: |
          mkdir -p libs
          wget -q https://github.com/LavaGang/MelonLoader/releases/download/v0.6.6/MelonLoader.x64.zip -O ml.zip
          unzip -j ml.zip "MelonLoader/MelonLoader.dll" -d libs/
          echo "MelonLoader.dll downloaded"

      - name: Download BoneLib and game stubs
        run: |
          wget -q https://github.com/SLZ-Mods/BoneLib/releases/download/v3.3.0/BoneLib.zip -O bonelib.zip
          unzip -j bonelib.zip "*.dll" -d libs/ || true
          wget -q https://github.com/SLZ-Mods/BoneLib/archive/refs/heads/main.zip -O bonelib-src.zip
          unzip -j bonelib-src.zip "*/GameLibs/*" -d libs/ 2>/dev/null || true
          unzip -j bonelib-src.zip "*/libs/*" -d libs/ 2>/dev/null || true
          ls libs/

      - name: Build mod
        run: dotnet build BoneworksArms.csproj -c Release

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: BoneworksArms
          path: "bin/Release/net6.0/BoneworksArms.dll"
          if-no-files-found: error
